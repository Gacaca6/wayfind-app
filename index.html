<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Theme Colors -->
    <meta name="theme-color" content="#FAF7F2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#2C1A0E" media="(prefers-color-scheme: dark)" />
    
    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Wayfind" />
    
    <!-- iOS Touch Icons -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-152x152.png" />
    
    <!-- iOS Splash Screen Images (optional, for future enhancement) -->
    <link rel="apple-touch-startup-image" href="/apple-touch-icon.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    
    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#FAF7F2" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />
    <meta name="msapplication-config" content="none" />
    
    <!-- App Description -->
    <meta name="description" content="Find scripture for what you're feeling right now. Daily verses, emotion-based search, and personalized spiritual guidance." />
    <meta name="keywords" content="bible, scripture, daily verse, christian, faith, spirituality, meditation, prayer" />
    <meta name="author" content="Wayfind" />
    <meta name="application-name" content="Wayfind" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Wayfind - Scripture for the searching heart" />
    <meta property="og:description" content="Find scripture for what you're feeling right now." />
    <meta property="og:image" content="/icons/icon-512x512.png" />
    <meta property="og:site_name" content="Wayfind" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wayfind - Scripture for the searching heart" />
    <meta name="twitter:description" content="Find scripture for what you're feeling right now." />
    <meta name="twitter:image" content="/icons/icon-512x512.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    
    <title>Wayfind - Scripture for the searching heart</title>
    
    <!-- Service Worker Registration (inline for early registration) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
